<div class="settings-page">
  <div class="page-header">
    <h1>System Settings</h1>
    <p>Manage your personal profile, credentials, and configure application preferences.</p>
  </div>

  <div class="settings-grid">
    <!-- Left Column: Photo Upload -->
    <div class="settings-card profile-photo-card">
      <h3>Profile Photo</h3>
      <div class="avatar-wrap">
        <div class="avatar-large">
          <img *ngIf="user?.profilePhoto" [src]="user.profilePhoto" alt="Profile" />
          <span *ngIf="!user?.profilePhoto" class="initials">{{ user?.firstName?.charAt(0) }}</span>
        </div>
        <div class="upload-actions">
          <label class="upload-btn">
            <i class="pi pi-camera"></i> Change Photo
            <input type="file" (change)="onFileSelected($event)" accept="image/*" style="display: none;" />
          </label>
          <p class="photo-info">Allowed formats: JPG, PNG. Max size: 2MB</p>
        </div>
      </div>
    </div>

    <!-- Right Column: Profile Form -->
    <div class="settings-card profile-details-card">
      <h3>Profile Details</h3>
      <div *ngIf="saveError" class="banner error-banner">
        <i class="pi pi-exclamation-triangle"></i> {{ saveError }}
      </div>
      <div *ngIf="saveSuccess" class="banner success-banner">
        <i class="pi pi-check-circle"></i> Profile settings updated successfully!
      </div>

      <form (ngSubmit)="saveProfile()" class="settings-form">
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <span class="input-wrapper">
              <i class="pi pi-user"></i>
              <input pInputText [(ngModel)]="profile.firstName" name="firstName" placeholder="First Name" class="settings-input" />
            </span>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <span class="input-wrapper">
              <i class="pi pi-user"></i>
              <input pInputText [(ngModel)]="profile.lastName" name="lastName" placeholder="Last Name" class="settings-input" />
            </span>
          </div>
        </div>

        <div class="form-group">
          <label>Email Address (Disabled)</label>
          <span class="input-wrapper disabled">
            <i class="pi pi-envelope"></i>
            <input pInputText [value]="user?.email" disabled class="settings-input" />
          </span>
        </div>

        <div class="form-group">
          <label>Contact Number</label>
          <span class="input-wrapper">
            <i class="pi pi-phone"></i>
            <input pInputText [(ngModel)]="profile.contactNumber" name="contactNumber" placeholder="Contact number" class="settings-input" />
          </span>
        </div>

        <div class="form-group">
          <label>New Password (leave blank to keep current)</label>
          <span class="input-wrapper">
            <i class="pi pi-lock"></i>
            <input pInputText type="password" [(ngModel)]="profile.password" name="password" placeholder="New password" class="settings-input" />
          </span>
        </div>

        <div class="form-group">
          <label>Security Role</label>
          <span class="input-wrapper disabled">
            <i class="pi pi-shield"></i>
            <input pInputText [value]="user?.role" disabled class="settings-input" />
          </span>
        </div>

        <button type="submit" class="save-btn" [disabled]="isSaving">
          <i class="pi pi-save" *ngIf="!isSaving"></i>
          <i class="pi pi-spin pi-spinner" *ngIf="isSaving"></i>
          Save Changes
        </button>
      </form>
    </div>
  </div>
</div>
