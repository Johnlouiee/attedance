<div class="landing-wrapper animate-fade-in">
  <!-- LEFT: Navy Branded Panel -->
  <div class="left-panel">
    <div class="left-panel-content">
      <!-- Floating decorative shapes -->
      <div class="deco-circle deco-circle-1"></div>
      <div class="deco-circle deco-circle-2"></div>
      <div class="deco-circle deco-circle-3"></div>

      <div class="brand-section">
        <div class="brand-logo">
          <i class="pi pi-shield brand-icon"></i>
          <span class="brand-text">Atten<span class="brand-highlight">Guard</span></span>
        </div>

        <h1 class="brand-headline">Smart Attendance,<br />Made Simple.</h1>
        <p class="brand-tagline">
          Secure QR check-ins, GPS geofencing, and real-time analytics — all in one platform.
        </p>
      </div>

      <!-- Feature pills -->
      <div class="feature-pills">
        <div class="pill">
          <i class="pi pi-qrcode"></i>
          <span>Dynamic QR</span>
        </div>
        <div class="pill">
          <i class="pi pi-map-marker"></i>
          <span>GPS Verified</span>
        </div>
        <div class="pill">
          <i class="pi pi-chart-bar"></i>
          <span>Live Analytics</span>
        </div>
      </div>

      <!-- Illustration placeholder — abstract person silhouette -->
      <div class="illustration-area">
        <div class="illustration-card card-1">
          <i class="pi pi-calendar"></i>
          <div class="illust-lines">
            <span class="line-long"></span>
            <span class="line-short"></span>
          </div>
        </div>
        <div class="illustration-person">
          <div class="person-head"></div>
          <div class="person-body"></div>
        </div>
        <div class="illustration-card card-2">
          <i class="pi pi-check-circle"></i>
          <div class="illust-lines">
            <span class="line-long"></span>
            <span class="line-short"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Clean White Welcome Panel -->
  <div class="right-panel">
    <div class="right-panel-content">
      

      <div class="welcome-section">
        <!-- Avatar icon -->
        <div class="avatar-ring">
          <i class="pi pi-user avatar-icon"></i>
        </div>

        <h2 class="welcome-title">WELCOME</h2>
        <p class="welcome-subtitle">Your smart campus attendance portal</p>
      </div>


      <!-- CTA Buttons -->
      <div class="cta-actions">
        <p-button
          label="LOGIN"
          icon="pi pi-sign-in"
          routerLink="/login"
          [raised]="true"
          [rounded]="true"
          styleClass="cta-login-btn"
        />
        <p-button
          label="REGISTER"
          icon="pi pi-user-plus"
          routerLink="/register"
          [outlined]="true"
          [rounded]="true"
          styleClass="cta-register-btn"
        />
      </div>

      <p class="footer-note">
        <i class="pi pi-info-circle"></i>
        Teachers & Admins are provisioned by an Administrator.
      </p>
    </div>
  </div>
</div>
